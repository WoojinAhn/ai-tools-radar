name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  poller:
    name: Poller (typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: poller/package-lock.json
      - working-directory: poller
        run: |
          npm ci
          npm run typecheck
          npm test

  site:
    name: Site (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json
      - working-directory: site
        run: |
          npm ci
          npm run build
